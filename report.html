<!DOCTYPE html>
<html>
<head>
    <title>Complaint Tracking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-lg">
        
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">
            Complaint Portal
        </h2>

        <input id="location"
            placeholder="Enter Location"
            class="border border-gray-300 p-3 w-full mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">

        <textarea id="description"
            placeholder="Enter Description"
            class="border border-gray-300 p-3 w-full mb-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>

        <button onclick="submitComplaint()"
            class="bg-green-600 hover:bg-green-700 text-white w-full py-3 rounded-lg font-semibold transition duration-200">
            Submit Complaint
        </button>

        <div id="result" class="mt-6"></div>

    </div>

<script>

function generateID() {
    return "CMP" + Math.floor(100000 + Math.random() * 900000);
}

function getComplaints() {
    return JSON.parse(localStorage.getItem("complaints")) || [];
}

function saveComplaints(complaints) {
    localStorage.setItem("complaints", JSON.stringify(complaints));
}

function submitComplaint(){

    let location = document.getElementById("location").value;
    let description = document.getElementById("description").value;

    if(location === "" || description === ""){
        alert("Please fill all fields");
        return;
    }

    let id = generateID();
    let complaints = getComplaints();

    complaints.push({
        id: id,
        location: location,
        description: description,
        status: "Pending"
    });

    saveComplaints(complaints);

    document.getElementById("result").innerHTML = `
        <div class="bg-green-100 border border-green-400 text-green-700 p-4 rounded-lg mt-4">
            Complaint Submitted Successfully! <br>
            <strong>Your Complaint ID:</strong> ${id} <br>
            <strong>Status:</strong> Pending
        </div>
    `;

    document.getElementById("location").value = "";
    document.getElementById("description").value = "";
}

</script>

</body>
</html>
